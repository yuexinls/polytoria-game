name: "Release checks"
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: 4.7.0
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  release-export-check:
    name: Release Export check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          lfs: true
          submodules: recursive
      - name: .NET Installation
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: true
          include-templates: false
          cache: true
      - name: Test Build Project
        run: |
          dotnet --version
          godot --version
          cd Polytoria
          dotnet restore
          godot --headless --verbose --build-solutions --quit
          dotnet build -c ExportRelease